# Transaction cost model parameters.
# Consumed by src/backtest/costs.py. Conservative parametric stand-in until a
# TAQ-informed slippage curve is available (see the taq_curve slot below).

# Half-spread paid on entry and exit, in basis points of price.
half_spread_bps: 5.0

# Commission per share, USD. Also supports a per-notional floor.
commission_per_share: 0.005
commission_min_usd: 1.0

# Slippage as a function of order size relative to average daily volume (ADV).
# impact_bps = coef * (order_adv_fraction ** exponent) * 10000
# coef=0.03 gives ~67bps one-way impact at the 5%-ADV cap, a standard square-root
# calibration (impact ~ k*sigma*sqrt(participation), k~1, daily sigma~3%). The prior
# 0.1 implied ~224bps, ~3x too punitive. Still a conservative pre-TAQ placeholder.
slippage:
  model: square_root          # square_root | linear
  coef: 0.03
  exponent: 0.5
  participation_cap: 0.05      # max fraction of ADV fillable in one session

# Reserved slot for the empirical TAQ-informed curve. Leave null until TAQ data
# arrives; costs.py must fall back to the parametric model above when null.
taq_curve: null

# Short-leg borrow (stock-loan) cost. Charged ONLY on the short legs of a spread,
# prorated over the holding horizon: annual_bps * horizon_days / 252. Flat tiered
# placeholder until a per-name/date loan-fee feed (Markit/IHS, or derived from the
# comp_shortint short-interest panel already ingested) wires the hard-to-borrow flag
# and, eventually, the loan_fee_curve. Longs are unaffected.
borrow:
  base_annual_bps: 50.0              # ~0.5%/yr general collateral (easy to borrow)
  hard_to_borrow_annual_bps: 1500.0  # ~15%/yr tier for flagged hard-to-borrow names
  loan_fee_curve: null               # reserved slot for empirical per-name/date fees
